name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GHCR_REGISTRY: ghcr.io
  MANIFESTS_REPO: <owner>/bioring-be-manifests
  APPS: api-gateway sample-microservice

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm test

  build-and-push:
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: [api-gateway, sample-microservice]
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_USERNAME }}/bioring-${{ matrix.app }}:${{ github.sha }}
          build-args: APP_NAME=${{ matrix.app }}

  update-manifests:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [api-gateway, sample-microservice]
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.MANIFESTS_REPO }}
          token: ${{ secrets.MANIFESTS_REPO_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update image tag
        run: |
          npm install -g yq
          yq -i '.spec.template.spec.containers[0].image = "${{ env.GHCR_REGISTRY }}/${{ secrets.GHCR_USERNAME }}/bioring-${{ matrix.app }}:${{ github.sha }}"' k8s/${{ matrix.app }}/deployment.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/${{ matrix.app }}/deployment.yaml
          git commit -m "chore: deploy ${{ matrix.app }} ${{ github.sha }}"
          git push
