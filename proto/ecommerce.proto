syntax = "proto3";

package ecommerce;

service EcommerceService {
  // Catalog
  rpc GetProducts (GetProductsRequest) returns (GetProductsResponse);
  rpc GetProductById (GetProductByIdRequest) returns (GetProductByIdResponse);
  rpc GetMaterials (Empty) returns (GetMaterialsResponse);
  rpc GetGemstones (Empty) returns (GetGemstonesResponse);

  // Design Drafts
  rpc CreateDesignDraft (CreateDesignDraftRequest) returns (CreateDesignDraftResponse);
  rpc GetDesignDraftByCode (GetDesignDraftByCodeRequest) returns (GetDesignDraftByCodeResponse);
  rpc GetMyDrafts (GetMyDraftsRequest) returns (GetMyDraftsResponse);
  rpc UpdateDesignDraft (UpdateDesignDraftRequest) returns (UpdateDesignDraftResponse);
  rpc ClaimDesignDraft (ClaimDesignDraftRequest) returns (ClaimDesignDraftResponse);

  // Engraving
  rpc CreateEngraving (CreateEngravingRequest) returns (CreateEngravingResponse);
  rpc UpdateEngravingVersionConfig (UpdateEngravingVersionConfigRequest) returns (UpdateEngravingVersionConfigResponse);
  rpc ResubmitEngravingVersion (ResubmitEngravingVersionRequest) returns (ResubmitEngravingVersionResponse);
  rpc GetMyEngravings (GetMyEngravingsRequest) returns (GetMyEngravingsResponse);
  rpc GetEngraving (GetEngravingRequest) returns (GetEngravingResponse);

  // Orders
  rpc CreateOrder (CreateOrderRequest) returns (CreateOrderResponse);
  rpc GetOrder (GetOrderRequest) returns (GetOrderResponse);
  rpc GetMyOrders (GetMyOrdersRequest) returns (GetMyOrdersResponse);
  rpc ReviewOrder (ReviewOrderRequest) returns (ReviewOrderResponse);

  // Orders — MF-03
  rpc SubmitOrder (SubmitOrderRequest) returns (SubmitOrderResponse);
  rpc AttachBiometric (AttachBiometricRequest) returns (AttachBiometricResponse);

  // Payments
  rpc InitiatePayment (InitiatePaymentRequest) returns (InitiatePaymentResponse);
  rpc HandlePayOSWebhook (PayOSWebhookRequest) returns (PayOSWebhookResponse);
  rpc CancelPayment (CancelPaymentRequest) returns (CancelPaymentResponse);

// Production
rpc AssignJeweler (AssignJewelerRequest) returns (AssignJewelerResponse);
rpc UpdateProductionStatus (UpdateProductionStatusRequest) returns (UpdateProductionStatusResponse);
rpc GetProductionTasks (GetProductionTasksRequest) returns (GetProductionTasksResponse);

  // QR Memory
  rpc UpdateQrMemory (UpdateQrMemoryRequest) returns (UpdateQrMemoryResponse);
  rpc GetQrMemory (GetQrMemoryRequest) returns (GetQrMemoryResponse);
  rpc ActivateQrMemory (ActivateQrMemoryRequest) returns (ActivateQrMemoryResponse);

  // Card Themes
  rpc GetCardThemes (GetCardThemesRequest) returns (GetCardThemesResponse);
  rpc GetCardTheme (GetCardThemeRequest) returns (GetCardThemeResponse);
  rpc CreateCardTheme (CreateCardThemeRequest) returns (CreateCardThemeResponse);
  rpc UpdateCardTheme (UpdateCardThemeRequest) returns (UpdateCardThemeResponse);
  rpc DeleteCardTheme (DeleteCardThemeRequest) returns (DeleteCardThemeResponse);
}

// ===== Messages =====

message ClaimDesignDraftRequest {
  string designCode = 1;
  string userId = 2;
}

message ClaimDesignDraftResponse {
  DesignDraft draft = 1;
  Engraving engraving = 2;
  EngravingVersion engravingVersion = 3;
}

// ===== Generic =====
message Empty {}

// ===== Catalog =====
message Product {
  string id = 1;
  string name = 2;
  string description = 3;
  string baseMaterialId = 4;
  double basePrice = 5;
  string thumbnailUrl = 6;
  string model3dUrl = 7;
  repeated Material availableMaterials = 8;
  repeated Gemstone availableGemstones = 9;
}

message GetProductsRequest {
  int32 page = 1;
  int32 limit = 2;
  string materialId = 3;
  double maxPrice = 4;
}

message GetProductsResponse {
  repeated Product products = 1;
  int32 total = 2;
  int32 page = 3;
  int32 limit = 4;
}

message GetProductByIdRequest {
  string id = 1;
}

message GetProductByIdResponse {
  Product product = 1;
}

message Material {
  string id = 1;
  string name = 2;
  string purity = 3;
  string color = 4;
  double currentPricePerGram = 5;
}

message GetMaterialsResponse {
  repeated Material materials = 1;
}

message Gemstone {
  string id = 1;
  string type = 2;
  double carat = 3;
  string cut = 4;
  string color = 5;
  string clarity = 6;
  string certificationCode = 7;
  double price = 8;
  bool isAvailable = 9;
}

message GetGemstonesResponse {
  repeated Gemstone gemstones = 1;
}

// ===== Design Draft =====
message DesignDraft {
  string id = 1;
  string userId = 2;
  string productId = 3;
  string designCode = 4;
  string designSource = 5;
  string ringStyle = 6;
  string ringShape = 7;
  string ringSize = 8;
  string selectedMaterialId = 9;
  string selectedGemstoneId = 10;
  string customizationConfig = 11;
  double estimatedPrice = 12;
  string status = 13;
  string createdAt = 14;
  string updatedAt = 15;
  Product product = 16;
  Material selectedMaterial = 17;
  Gemstone selectedGemstone = 18;
}

message GetMyDraftsRequest {
  string guestSessionId = 1;
  int32 page = 2;
  int32 limit = 3;
}

message GetMyDraftsResponse {
  repeated DesignDraft drafts = 1;
  int32 total = 2;
  int32 page = 3;
  int32 limit = 4;
}

message CreateDesignDraftRequest {
  string productId = 1;
  string ringStyle = 2;
  string ringShape = 3;
  string ringSize = 4;
  string selectedMaterialId = 5;
  string selectedGemstoneId = 6;
  string customizationConfig = 7;
  string guestSessionId = 8;
}

message CreateDesignDraftResponse {
  DesignDraft draft = 1;
  string designCode = 2;
}

message GetDesignDraftByCodeRequest {
  string designCode = 1;
}

message GetDesignDraftByCodeResponse {
  DesignDraft draft = 1;
}

message UpdateDesignDraftRequest {
  string id = 1;
  string ringStyle = 2;
  string ringShape = 3;
  string ringSize = 4;
  string selectedMaterialId = 5;
  string selectedGemstoneId = 6;
  string customizationConfig = 7;
  string guestSessionId = 8;
}

message UpdateDesignDraftResponse {
  DesignDraft draft = 1;
}

// === Engraving ===
message CreateEngravingRequest {
  string userId = 1;
  string productId = 2;
}

message CreateEngravingResponse {
  Engraving engraving = 1;
  EngravingVersion engravingVersion = 2;
  string qrCode = 3;
}

message UpdateEngravingVersionConfigRequest {
  string engravingVersionId = 1;
  string customizationConfig = 2;
  string selectedMaterialId = 3;
  string selectedGemstoneId = 4;
  string ringSize = 5;
  string ringStyle = 6;
  string ringShape = 7;
  string previewImageUrl = 8;
  string model3dUrl = 9;
  string productionFileUrl = 10;
  string audioUrl = 11;
}

message ResubmitEngravingVersionRequest {
  string engravingVersionId = 1;
}

message ResubmitEngravingVersionResponse {
  EngravingVersion version = 1;
  string orderId = 2;
  string orderStatus = 3;
}

message UpdateEngravingVersionConfigResponse {
  EngravingVersion version = 1;
  string orderId = 2;
  string orderStatus = 3;
}

message GetMyEngravingsRequest {
  string userId = 1;
  int32 page = 2;
  int32 limit = 3;
  string status = 4;
  string orderId = 5;
}

message GetMyEngravingsResponse {
  repeated Engraving engravings = 1;
  int32 total = 2;
  int32 page = 3;
  int32 limit = 4;
}

message GetEngravingRequest {
  string id = 1;
}

message GetEngravingResponse {
  Engraving engraving = 1;
}

// === Orders ===
message Order {
  string id = 1;
  string orderCode = 2;
  string userId = 3;
  string designDraftId = 4;
  string captureRoute = 5;
  string designSource = 6;
  string status = 7;
  double subtotal = 8;
  double serviceFee = 9;
  double extraFee = 10;
  double discountAmount = 11;
  double totalPrice = 12;
  double paidAmount = 13;
  double remainingAmount = 14;
  string note = 15;
  string createdAt = 16;
  string updatedAt = 17;
  DesignDraft designDraft = 18;
  repeated Payment payments = 19;
  repeated Engraving engravings = 20;
}

message CreateOrderRequest {
  repeated string engravingIds = 1;
  string userId = 2;
  string packageType = 3;
}

message CreateOrderResponse {
  Order order = 1;
}

message GetOrderRequest {
  string id = 1;
}

message GetOrderResponse {
  Order order = 1;
}

message GetMyOrdersRequest {
  int32 page = 1;
  int32 limit = 2;
  string userId = 3;
}

message GetMyOrdersResponse {
  repeated Order orders = 1;
  int32 total = 2;
  int32 page = 3;
  int32 limit = 4;
}

message ReviewOrderRequest {
  string id = 1;
  string action = 2;
  string note = 3;
  string managerId = 4;
  repeated string engravingIds = 5;  // empty = all engravings
}

message ReviewOrderResponse {
  Order order = 1;
}

message SubmitOrderRequest {
  string id = 1;
}

message SubmitOrderResponse {
  Order order = 1;
}

message AttachBiometricRequest {
  string engravingId = 1;
  string biometricType = 2;
  string rawFileUrl = 3;
}

message AttachBiometricResponse {
  EngravingBioMetric biometric = 1;
}

// === Engraving messages ===
message Engraving {
  string id = 1;
  string orderId = 2;
  string userId = 3;
  string productId = 4;
  string uniqueProductId = 5;
  string approvedVersionId = 6;
  string status = 7;
  repeated EngravingVersion versions = 8;
  repeated EngravingBioMetric biometrics = 9;
  QrMemory qrMemory = 10;
  EngravingVersion currentVersion = 11;
}

message EngravingVersion {
  string id = 1;
  string engravingId = 2;
  int32 versionNumber = 3;
  string selectedMaterialId = 4;
  string selectedGemstoneId = 5;
  string ringSize = 6;
  string ringStyle = 7;
  string ringShape = 8;
  string customizationConfig = 9;
  string status = 10;
  string managerId = 11;
  string managerNote = 12;
  string reviewedAt = 13;
  string createdAt = 14;
  Material selectedMaterial = 15;
  Gemstone selectedGemstone = 16;
}

message EngravingBioMetric {
  string id = 1;
  string engravingId = 2;
  string biometricType = 3;
  string requiredChannel = 4;
  string rawFileUrl = 5;
  string processedSvgUrl = 6;
  string extraData = 7;
  string status = 8;
}

// === Payment ===
message Payment {
  string id = 1;
  string orderId = 2;
  string paymentPhase = 3;
  double amount = 4;
  string method = 5;
  string status = 6;
  string payosTransactionId = 7;
  string paymentUrl = 8;
  string paidAt = 9;
  string createdAt = 10;
}

message InitiatePaymentRequest {
  string orderId = 1;
  string paymentPhase = 2;
  string returnUrl = 3;
  string cancelUrl = 4;
  string userId = 5;
}

message InitiatePaymentResponse {
  Payment payment = 1;
  string paymentUrl = 2;
  string qrCode = 3;
}

message PayOSWebhookRequest {
  string webhookBody = 1;
}

message PayOSWebhookResponse {
  bool success = 1;
}

message CancelPaymentRequest {
  string orderId = 1;
  string userId = 2;
}

message CancelPaymentResponse {
  bool success = 1;
  string orderCode = 2;
}

// === Production ===
message ProductionTask {
  string id = 1;
  string orderId = 2;
  string engravingId = 3;
  string assignedJewelerId = 4;
  string assignedJewelerName = 5;
  string status = 6;
  string note = 7;
  string startedAt = 8;
  string completedAt = 9;
  string createdAt = 10;
  string taskName = 11;
  string taskDescription = 12;
}

message AssignJewelerRequest {
  string orderId = 1;
  string jewelerId = 2;
}

message AssignJewelerResponse {
  ProductionTask task = 1;
}

message UpdateProductionStatusRequest {
  string taskId = 1;
  string status = 2;
  string note = 3;
}

message UpdateProductionStatusResponse {
  ProductionTask task = 1;
}

message GetProductionTasksRequest {
  int32 page = 1;
  int32 limit = 2;
  string status = 3;
  string orderId = 4;
  string jewelerId = 5;
}

message GetProductionTasksResponse {
  repeated ProductionTask data = 1;
  int32 total = 2;
  int32 page = 3;
  int32 limit = 4;
  int32 lastPage = 5;
}

// === QR Memory ===
message CardTheme {
  string id = 1;
  string themeCode = 2;
  string name = 3;
  string defaultBgUrl = 4;
  string styleConfig = 5;
  bool isActive = 6;
  string createdAt = 7;
}

message GetCardThemesRequest {
  int32 page = 1;
  int32 limit = 2;
}

message GetCardThemesResponse {
  repeated CardTheme cardThemes = 1;
  int32 total = 2;
  int32 page = 3;
  int32 limit = 4;
}

message GetCardThemeRequest {
  string id = 1;
}

message GetCardThemeResponse {
  CardTheme cardTheme = 1;
}

message CreateCardThemeRequest {
  string themeCode = 1;
  string name = 2;
  string defaultBgUrl = 3;
  string styleConfig = 4;
}

message CreateCardThemeResponse {
  CardTheme cardTheme = 1;
}

message UpdateCardThemeRequest {
  string id = 1;
  string themeCode = 2;
  string name = 3;
  string defaultBgUrl = 4;
  string styleConfig = 5;
}

message UpdateCardThemeResponse {
  CardTheme cardTheme = 1;
}

message DeleteCardThemeRequest {
  string id = 1;
}

message DeleteCardThemeResponse {
  bool success = 1;
}

message QrMemory {
  string id = 1;
  string engravingId = 2;
  string qrCode = 3;
  string cardTitle = 4;
  string greetingMessage = 5;
  string recipientEmail = 6;
  string biometricDisplaySettings = 7;
  string accessPinHash = 8;
  bool isLocked = 9;
  string createdAt = 10;
  string updatedAt = 11;
  CardTheme cardTheme = 12;
}

message UpdateQrMemoryRequest {
  string engravingId = 1;
  string cardTitle = 2;
  string greetingMessage = 3;
  string recipientEmail = 4;
  string cardThemeId = 5;
  string customImages = 6;
  string biometricDisplaySettings = 7;
}

message UpdateQrMemoryResponse { QrMemory qrMemory = 1; }

message GetQrMemoryRequest { string engravingId = 1; }
message GetQrMemoryResponse { QrMemory qrMemory = 1; }

message ActivateQrMemoryRequest {
  string qrCode = 1;
  string accessPin = 2;
}

message ActivateQrMemoryResponse { QrMemory qrMemory = 1; }
